<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - Museum AI Guide</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ชุดสี Theme เดียวกับหน้า Login */
        :root {
            --color-dark: #0C2B4E;
            --color-main: #1A3D64;
            --color-accent: #1D546C;
            --color-light: #F4F4F4;
        }

        body {
            background-color: var(--color-dark);
            color: var(--color-light);
            background-image: radial-gradient(circle at top right, var(--color-main), var(--color-dark));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .reset-card {
            background-color: var(--color-light);
            color: var(--color-dark);
        }

        .text-main { color: var(--color-main) !important; }

        .btn-primary {
            background-color: var(--color-main);
            border-color: var(--color-main);
            color: var(--color-light);
        }
        .btn-primary:hover {
            background-color: var(--color-dark);
            border-color: var(--color-dark);
        }

        .form-control:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 0.25rem rgba(29, 84, 108, 0.25);
        }
    </style>
</head>

<body>

    <div class="position-absolute top-0 end-0 p-3 p-md-4">
        <select class="form-select form-select-sm bg-transparent text-light" style="border-color: rgba(255,255,255,0.3); width: auto;" id="pageLanguage">
            <option value="th" class="text-dark">🇹🇭 ไทย (TH)</option>
            <option value="en" class="text-dark">🇬🇧 English (EN)</option>
            <option value="cn" class="text-dark">🇨🇳 中文 (CN)</option>
        </select>
    </div>

    <div class="container px-3 py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-white mb-2" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.3);">🏛️ Museum AI</h1>
                    <p id="txt-subtitle" class="text-light opacity-75">นิทรรศการดิจิทัลอัจฉริยะ</p>
                </div>

                <div class="reset-card p-4 p-md-5 rounded-4 shadow-lg border-0">
                    <h3 id="txt-header" class="fw-bold text-center mb-3 text-main">รีเซ็ตรหัสผ่าน</h3>
                    <p id="txt-desc" class="text-center text-muted small mb-4">กรุณากรอกอีเมลที่ใช้สมัครสมาชิก ระบบจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปให้คุณ</p>
                    
                    <form id="resetForm">
                        <div class="mb-4">
                            <label id="txt-email-label" for="email" class="form-label fw-semibold">อีเมล (Email)</label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="name@example.com" required>
                        </div>

                        <div id="statusMessage" class="alert d-none text-center py-2 mb-3 small" role="alert"></div>

                        <button type="submit" id="txt-submit-btn" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm mb-3">
                            ส่งลิงก์รีเซ็ตรหัสผ่าน
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a id="txt-back" href="login.html" class="fw-bold text-decoration-none text-main">⬅ กลับไปหน้าเข้าสู่ระบบ</a>
                    </div>

                </div>
                
                <div class="text-center mt-4 text-light opacity-50 small">
                    &copy; 2026 Museum AI Guide
                </div>

            </div>
        </div>
    </div>

    <script>
        // =========================
        // ระบบแปลภาษา (Translation)
        // =========================
        const pageTranslations = {
            th: {
                subtitle: "นิทรรศการดิจิทัลอัจฉริยะ",
                header: "รีเซ็ตรหัสผ่าน",
                desc: "กรุณากรอกอีเมลที่ใช้สมัครสมาชิก ระบบจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปให้คุณ",
                emailLabel: "อีเมล (Email)",
                submitBtn: "ส่งลิงก์รีเซ็ตรหัสผ่าน",
                back: "⬅ กลับไปหน้าเข้าสู่ระบบ",
                successMsg: "ส่งลิงก์สำเร็จแล้ว! กรุณาตรวจสอบกล่องข้อความอีเมลของคุณ",
                errorMsg: "เกิดข้อผิดพลาด โปรดลองอีกครั้ง"
            },
            en: {
                subtitle: "Smart Digital Exhibition",
                header: "Reset Password",
                desc: "Enter the email associated with your account and we'll send you a link to reset your password.",
                emailLabel: "Email",
                submitBtn: "Send Reset Link",
                back: "⬅ Back to Login",
                successMsg: "Reset link sent! Please check your email inbox.",
                errorMsg: "An error occurred. Please try again."
            },
            cn: {
                subtitle: "智能数字展览",
                header: "重置密码",
                desc: "请输入您注册时使用的电子邮件，我们将向您发送重置密码的链接。",
                emailLabel: "电子邮件 (Email)",
                submitBtn: "发送重置链接",
                back: "⬅ 返回登录",
                successMsg: "重置链接已发送！请检查您的收件箱。",
                errorMsg: "发生错误，请重试。"
            }
        };

        let currentSuccessMsg = pageTranslations["th"].successMsg;
        let currentErrorMsg = pageTranslations["th"].errorMsg;

        document.getElementById("pageLanguage").addEventListener("change", function() {
            const lang = this.value;
            const t = pageTranslations[lang];
            
            document.getElementById("txt-subtitle").innerText = t.subtitle;
            document.getElementById("txt-header").innerText = t.header;
            document.getElementById("txt-desc").innerText = t.desc;
            document.getElementById("txt-email-label").innerText = t.emailLabel;
            document.getElementById("txt-submit-btn").innerText = t.submitBtn;
            document.getElementById("txt-back").innerText = t.back;

            currentSuccessMsg = t.successMsg;
            currentErrorMsg = t.errorMsg;

            // อัปเดตข้อความ Alert ถ้ามันกำลังแสดงอยู่
            const statusBox = document.getElementById("statusMessage");
            if (!statusBox.classList.contains("d-none")) {
                if(statusBox.classList.contains("alert-success")) {
                    statusBox.innerText = currentSuccessMsg;
                } else {
                    statusBox.innerText = currentErrorMsg;
                }
            }
        });

        // =========================
        // จำลองการส่งข้อมูล (ฟอร์ม)
        // =========================
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const statusBox = document.getElementById('statusMessage');

            console.log("กำลังส่งลิงก์รีเซ็ตไปที่:", email);

            // --- ใส่โค้ด Supabase ลืมรหัสผ่านตรงนี้ ---
            /* ตัวอย่างโค้ด Supabase:
            supabase.auth.resetPasswordForEmail(email)
                .then(({ data, error }) => {
                    statusBox.classList.remove("d-none", "alert-danger", "alert-success");
                    if (error) {
                        statusBox.classList.add("alert-danger");
                        statusBox.innerText = error.message; // หรือใช้ currentErrorMsg
                    } else {
                        statusBox.classList.add("alert-success");
                        statusBox.innerText = currentSuccessMsg;
                        document.getElementById('email').value = ""; // เคลียร์ช่อง
                    }
                });
            */

            // แสดงข้อความสำเร็จจำลองไปก่อน
            statusBox.classList.remove("d-none", "alert-danger");
            statusBox.classList.add("alert-success");
            statusBox.innerText = currentSuccessMsg;
        });
    </script>
</body>
</html>
