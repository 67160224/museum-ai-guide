<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Museum AI Guide</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background-color: #152133;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }
    </style>
</head>
<body>

    <div class="login-card text-center position-relative">
        
        <div class="d-flex justify-content-end mb-3">
            <select id="langSelect" class="form-select form-select-sm w-auto shadow-sm" onchange="changeLang()">
                <option value="th">TH</option>
                <option value="en">EN</option>
                <option value="cn">CN</option>
            </select>
        </div>

        <div class="mb-4">
            <h2 id="titleText" class="fw-bold text-dark">เข้าสู่ระบบ</h2>
            <p class="text-muted mb-0">Museum AI Guide</p>
        </div>

        <div class="mb-3 text-start">
            <input type="email" id="emailInput" class="form-control form-control-lg" placeholder="อีเมล">
        </div>
        <div class="mb-3 text-start">
            <input type="password" id="passwordInput" class="form-control form-control-lg" placeholder="รหัสผ่าน">
        </div>
        
        <button onclick="loginWithEmail()" class="btn btn-primary w-100 mb-3 py-2 fw-bold shadow-sm" style="border-radius: 10px;">
            <span id="btnEmailLoginText">เข้าสู่ระบบ</span>
        </button>

        <div class="position-relative mb-3 mt-2">
            <hr>
            <span class="position-absolute top-50 start-50 translate-middle px-2 text-muted" style="background: rgba(255,255,255,0.95); font-size: 14px;" id="orText">หรือ</span>
        </div>

        <button onclick="loginWithGoogle()" class="btn btn-outline-dark w-100 mb-3 py-2 d-flex align-items-center justify-content-center shadow-sm" style="border-radius: 10px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" width="20" class="me-2">
            <span id="btnGoogleText" class="fw-bold">เข้าสู่ระบบด้วย Google</span>
        </button>

        <button onclick="loginAsGuest()" class="btn btn-secondary w-100 py-2 shadow-sm" style="border-radius: 10px;">
            <span id="btnGuestText">เข้าใช้งานแบบผู้เยี่ยมชม</span>
        </button>
        
    </div>

    <script>
        // 1. ระบบเปลี่ยนภาษา
        const translations = {
            th: { 
                title: "เข้าสู่ระบบ",
                emailPlaceholder: "อีเมล",
                passwordPlaceholder: "รหัสผ่าน",
                emailLogin: "เข้าสู่ระบบ",
                google: "เข้าสู่ระบบด้วย Google", 
                or: "หรือ", 
                guest: "เข้าใช้งานแบบผู้เยี่ยมชม",
                alertMissing: "กรุณากรอกอีเมลและรหัสผ่าน",
                alertError: "อีเมลหรือรหัสผ่านไม่ถูกต้อง"
            },
            en: { 
                title: "Login",
                emailPlaceholder: "Email",
                passwordPlaceholder: "Password",
                emailLogin: "Login",
                google: "Sign in with Google", 
                or: "or", 
                guest: "Continue as Guest",
                alertMissing: "Please enter email and password",
                alertError: "Invalid email or password"
            },
            cn: { 
                title: "登录",
                emailPlaceholder: "电子邮件",
                passwordPlaceholder: "密码",
                emailLogin: "登录",
                google: "使用 Google 登录", 
                or: "或", 
                guest: "作为访客继续",
                alertMissing: "请输入电子邮件和密码",
                alertError: "电子邮件或密码无效"
            }
        };

        function changeLang() {
            const lang = document.getElementById("langSelect").value;
            document.getElementById("titleText").innerText = translations[lang].title;
            document.getElementById("emailInput").placeholder = translations[lang].emailPlaceholder;
            document.getElementById("passwordInput").placeholder = translations[lang].passwordPlaceholder;
            document.getElementById("btnEmailLoginText").innerText = translations[lang].emailLogin;
            document.getElementById("btnGoogleText").innerText = translations[lang].google;
            document.getElementById("orText").innerText = translations[lang].or;
            document.getElementById("btnGuestText").innerText = translations[lang].guest;
        }

        // 2. ตั้งค่า Supabase
        const mySupabaseUrl = 'https://poderwfuvejrsrqydcbj.supabase.co';
        const mySupabaseKey = 'sb_publishable_3FtM0O9-55E0OM_Xl7gJ4g_Wlp_NXen'; 
        const supabaseAuthClient = window.supabase.createClient(mySupabaseUrl, mySupabaseKey);

        // 3. ฟังก์ชันล็อคอินด้วย Email / Password
        async function loginWithEmail() {
            const email = document.getElementById("emailInput").value.trim();
            const password = document.getElementById("passwordInput").value.trim();
            const lang = document.getElementById("langSelect").value;

            if (!email || !password) {
                alert(translations[lang].alertMissing);
                return;
            }

            const { data, error } = await supabaseAuthClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                console.error("Login Error:", error.message);
                alert(translations[lang].alertError);
            } else {
                // ล็อคอินสำเร็จ เด้งไปหน้าหลัก
                window.location.href = 'index.html';
            }
        }

        // 4. ฟังก์ชันล็อคอินด้วย Google
        async function loginWithGoogle() {
            await supabaseAuthClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://museum-ai-guide.wasmer.app/index.html'
                }
            });
        }

        // 5. ฟังก์ชันเข้าสู่ระบบแบบผู้เยี่ยมชม (Guest)
        function loginAsGuest() {
            localStorage.setItem('guestMode', 'true');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
