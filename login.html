<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - AI Museum Guide</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        /* สไตล์ปุ่มพื้นฐาน */
        button { width: 100%; padding: 10px; margin-top: 10px; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        
        /* สีปุ่มแต่ละแบบ */
        .btn-email { background-color: #007bff; }
        .btn-email:hover { background-color: #0056b3; }
        .btn-google { background-color: #db4437; }
        .btn-google:hover { background-color: #c23321; }
        .btn-facebook { background-color: #4267B2; }
        .btn-facebook:hover { background-color: #365899; }
        
        .divider { margin: 20px 0; border-bottom: 1px solid #ddd; position: relative; }
        .divider span { background: white; padding: 0 10px; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: #777; font-size: 14px; }
        .toggle-text { margin-top: 15px; font-size: 14px; color: #555; cursor: pointer; text-decoration: underline; }
        #message { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="form-title">เข้าสู่ระบบ</h2>
    
    <input type="email" id="email" placeholder="อีเมล (Email)" required>
    <input type="password" id="password" placeholder="รหัสผ่าน (Password)" required>
    <button class="btn-email" id="submit-btn" onclick="handleAuth()">เข้าสู่ระบบด้วยอีเมล</button>
