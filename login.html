<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Museum AI Guide</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background-color: #152133;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            margin: 20px;
            overflow: hidden; /* ป้องกันเนื้อหาล้นตอนสลับหน้า */
        }
    </style>
</head>
<body>

    <div class="login-card text-center position-relative">
        
        <div class="d-flex justify-content-end mb-3">
            <select id="langSelect" class="form-select form-select-sm w-auto shadow-sm" onchange="changeLang()">
                <option value="th">🇹🇭 TH</option>
                <option value="en">🇬🇧 EN</option>
                <option value="cn">🇨🇳 CN</option>
            </select>
        </div>

        <div id="loginSection">
            <div class="mb-4">
                <h2 id="titleText" class="fw-bold text-dark">เข้าสู่ระบบ</h2>
                <p class="text-muted mb-0">Museum AI Guide</p>
            </div>

            <div class="mb-3 text-start">
                <input type="email" id="emailInput" class="form-control form-control-lg" placeholder="อีเมล">
            </div>
            <div class="mb-1 text-start">
                <input type="password" id="passwordInput" class="form-control form-control-lg" placeholder="รหัสผ่าน">
            </div>
            
            <div class="text-end mb-3">
                <a href="javascript:void(0)" id="forgotPasswordLink" onclick="toggleView('forgot')" class="text-decoration-none small text-primary fw-bold">ลืมรหัสผ่าน?</a>
            </div>
            
            <button onclick="loginWithEmail()" class="btn btn-primary w-100 mb-3 py-2 fw-bold shadow-sm" style="border-radius: 10px;">
                <span id="btnEmailLoginText">เข้าสู่ระบบ</span>
            </button>

            <div class="position-relative mb-3 mt-2">
                <hr>
                <span class="position-absolute top-50 start-50 translate-middle px-2 text-muted" style="background: rgba(255,255,255,0.95); font-size: 14px;" id="orText">หรือ</span>
            </div>

            <button onclick="loginWithGoogle()" class="btn btn-outline-dark w-100 mb-3 py-2 d-flex align-items-center justify-content-center shadow-sm" style="border-radius: 10px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" width="20" class="me-2">
                <span id="btnGoogleText" class="fw-bold">เข้าสู่ระบบด้วย Google</span>
            </button>

            <button onclick="loginAsGuest()" class="btn btn-secondary w-100 py-2 shadow-sm" style="border-radius: 10px;">
                <span id="btnGuestText">เข้าใช้งานแบบผู้เยี่ยมชม</span>
            </button>
        </div>

        <div id="forgotSection" style="display: none;">
            <div class="mb-4">
                <h2 id="forgotTitleText" class="fw-bold text-dark">รีเซ็ตรหัสผ่าน</h2>
                <p id="forgotDescText" class="text-muted mb-0 small">กรุณากรอกอีเมลของคุณเพื่อรับลิงก์สำหรับตั้งรหัสผ่านใหม่</p>
            </div>

            <div class="mb-4 text-start">
                <input type="email" id="resetEmailInput" class="form-control form-control-lg" placeholder="อีเมล">
            </div>

            <button onclick="sendResetEmail()" class="btn btn-warning w-100 mb-3 py-2 fw-bold shadow-sm" style="border-radius: 10px;">
                <span id="btnSendResetText">ส่งลิงก์เปลี่ยนรหัสผ่าน</span>
            </button>

            <button onclick="toggleView('login')" class="btn btn-light w-100 py-2 shadow-sm" style="border-radius: 10px;">
                <span id="btnBackLoginText">กลับไปหน้าเข้าสู่ระบบ</span>
            </button>
        </div>
        
    </div>

    <script>
        // 1. ระบบเปลี่ยนภาษา (รวมคำศัพท์สำหรับหน้าลืมรหัสผ่านด้วย)
        const translations = {
            th: { 
                title: "เข้าสู่ระบบ",
                emailPlaceholder: "อีเมล",
                passwordPlaceholder: "รหัสผ่าน",
                emailLogin: "เข้าสู่ระบบ",
                forgotLink: "ลืมรหัสผ่าน?",
                google: "เข้าสู่ระบบด้วย Google", 
                or: "หรือ", 
                guest: "เข้าใช้งานแบบผู้เยี่ยมชม",
                alertMissing: "กรุณากรอกอีเมลและรหัสผ่าน",
                alertError: "อีเมลหรือรหัสผ่านไม่ถูกต้อง",
                // สำหรับลืมรหัสผ่าน
                forgotTitle: "รีเซ็ตรหัสผ่าน",
                forgotDesc: "กรุณากรอกอีเมลของคุณเพื่อรับลิงก์สำหรับตั้งรหัสผ่านใหม่",
                sendReset: "ส่งลิงก์เปลี่ยนรหัสผ่าน",
                backLogin: "กลับไปหน้าเข้าสู่ระบบ",
                alertResetSuccess: "ระบบส่งลิงก์ไปยังอีเมลของคุณแล้ว กรุณาตรวจสอบกล่องจดหมาย",
                alertResetError: "ไม่สามารถส่งอีเมลได้ กรุณาตรวจสอบอีเมลอีกครั้ง หรืออีเมลนี้อาจยังไม่ได้สมัครสมาชิก"
            },
            en: { 
                title: "Login",
                emailPlaceholder: "Email",
                passwordPlaceholder: "Password",
                emailLogin: "Login",
                forgotLink: "Forgot Password?",
                google: "Sign in with Google", 
                or: "or", 
                guest: "Continue as Guest",
                alertMissing: "Please enter your email and password",
                alertError: "Invalid email or password",
                // สำหรับลืมรหัสผ่าน
                forgotTitle: "Reset Password",
                forgotDesc: "Please enter your email to receive a password reset link.",
                sendReset: "Send Reset Link",
                backLogin: "Back to Login",
                alertResetSuccess: "Reset link sent! Please check your inbox.",
                alertResetError: "Failed to send email. Please check your email address."
            },
            cn: { 
                title: "登录",
                emailPlaceholder: "电子邮件",
                passwordPlaceholder: "密码",
                emailLogin: "登录",
                forgotLink: "忘记密码？",
                google: "使用 Google 登录", 
                or: "或", 
                guest: "作为访客继续",
                alertMissing: "请输入电子邮件和密码",
                alertError: "电子邮件或密码无效",
                // สำหรับลืมรหัสผ่าน
                forgotTitle: "重置密码",
                forgotDesc: "请输入您的电子邮件以接收密码重置链接。",
                sendReset: "发送重置链接",
                backLogin: "返回登录",
                alertResetSuccess: "重置链接已发送！请检查您的收件箱。",
                alertResetError: "发送邮件失败，请检查您的电子邮件地址。"
            }
        };

        function changeLang() {
            const lang = document.getElementById("langSelect").value;
            // หน้า Login
            document.getElementById("titleText").innerText = translations[lang].title;
            document.getElementById("emailInput").placeholder = translations[lang].emailPlaceholder;
            document.getElementById("passwordInput").placeholder = translations[lang].passwordPlaceholder;
            document.getElementById("btnEmailLoginText").innerText = translations[lang].emailLogin;
            document.getElementById("forgotPasswordLink").innerText = translations[lang].forgotLink;
            document.getElementById("btnGoogleText").innerText = translations[lang].google;
            document.getElementById("orText").innerText = translations[lang].or;
            document.getElementById("btnGuestText").innerText = translations[lang].guest;
            
            // หน้าลืมรหัสผ่าน
            document.getElementById("forgotTitleText").innerText = translations[lang].forgotTitle;
            document.getElementById("forgotDescText").innerText = translations[lang].forgotDesc;
            document.getElementById("resetEmailInput").placeholder = translations[lang].emailPlaceholder;
            document.getElementById("btnSendResetText").innerText = translations[lang].sendReset;
            document.getElementById("btnBackLoginText").innerText = translations[lang].backLogin;
        }

        // 2. ฟังก์ชันสลับหน้าจอ (Login <-> Forgot Password)
        function toggleView(view) {
            if (view === 'forgot') {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('forgotSection').style.display = 'block';
            } else {
                document.getElementById('forgotSection').style.display = 'none';
                document.getElementById('loginSection').style.display = 'block';
            }
        }

        // 3. ตั้งค่า Supabase
        const mySupabaseUrl = 'https://poderwfuvejrsrqydcbj.supabase.co';
        const mySupabaseKey = 'sb_publishable_3FtM0O9-55E0OM_Xl7gJ4g_Wlp_NXen'; 
        const supabaseAuthClient = window.supabase.createClient(mySupabaseUrl, mySupabaseKey);

        // 4. ล็อคอินด้วย Email
        async function loginWithEmail() {
            const email = document.getElementById("emailInput").value.trim();
            const password = document.getElementById("passwordInput").value.trim();
            const lang = document.getElementById("langSelect").value;

            if (!email || !password) {
                alert(translations[lang].alertMissing);
                return;
            }

            const { data, error } = await supabaseAuthClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                console.error("Login Error:", error.message);
                alert(translations[lang].alertError);
            } else {
                window.location.href = 'index.html';
            }
        }

        // 5. ส่งอีเมลรีเซ็ตรหัสผ่าน
        async function sendResetEmail() {
            const email = document.getElementById("resetEmailInput").value.trim();
            const lang = document.getElementById("langSelect").value;

            if (!email) {
                alert(translations[lang].alertMissing);
                return;
            }

            // ส่งคำขอรีเซ็ตรหัสผ่านไปยัง Supabase
            const { data, error } = await supabaseAuthClient.auth.resetPasswordForEmail(email, {
                // เปลี่ยนเป็นลิงก์หน้าสร้างรหัสใหม่ของคุณในอนาคตได้ (ตอนนี้ใส่หน้า index ไปก่อน)
                redirectTo: 'https://museum-ai-guide.wasmer.app/index.html',
            });

            if (error) {
                console.error("Reset Error:", error.message);
                alert(translations[lang].alertResetError);
            } else {
                alert(translations[lang].alertResetSuccess);
                document.getElementById("resetEmailInput").value = ""; // เคลียร์ช่องพิมพ์
                toggleView('login'); // เด้งกลับหน้าล็อคอิน
            }
        }

        // 6. ล็อคอินด้วย Google
        async function loginWithGoogle() {
            await supabaseAuthClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://museum-ai-guide.wasmer.app/index.html'
                }
            });
        }

        // 7. ล็อคอินแบบ Guest
        function loginAsGuest() {
            localStorage.setItem('guestMode', 'true');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
