<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Museum AI Guide</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ชุดสีเดียวกับหน้าหลัก */
        :root {
            --color-dark: #0C2B4E;    /* สีกรมท่าเข้มสุด (พื้นหลังหลัก) */
            --color-main: #1A3D64;    /* สีกรมท่า (ปุ่มหลัก, หัวข้อ) */
            --color-accent: #1D546C;  /* สีฟ้าอมเขียว (ส่วนตกแต่ง) */
            --color-light: #F4F4F4;   /* สีเทาอ่อน (กล่องการ์ด) */
        }

        body {
            background-color: var(--color-dark);
            color: var(--color-light);
            /* เพิ่มพื้นหลังแบบมีมิติเล็กน้อย (Optional) */
            background-image: radial-gradient(circle at top right, var(--color-main), var(--color-dark));
        }

        .login-card {
            background-color: var(--color-light);
            color: var(--color-dark);
        }

        .text-main {
            color: var(--color-main) !important;
        }

        .btn-primary {
            background-color: var(--color-main);
            border-color: var(--color-main);
            color: var(--color-light);
        }
        
        .btn-primary:hover {
            background-color: var(--color-dark);
            border-color: var(--color-dark);
        }

        .form-control:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 0.25rem rgba(29, 84, 108, 0.25);
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="container px-3">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4">
                
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-white mb-2" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.3);">🏛️ Museum AI</h1>
                    <p class="text-light opacity-75">นิทรรศการดิจิทัลอัจฉริยะ</p>
                </div>

                <div class="login-card p-4 p-md-5 rounded-4 shadow-lg border-0">
                    <h3 class="fw-bold text-center mb-4 text-main">เข้าสู่ระบบ</h3>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">อีเมล (Email)</label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="name@example.com" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">รหัสผ่าน (Password)</label>
                            <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••" required>
                        </div>

                        <div id="loginError" class="alert alert-danger d-none text-center py-2 mb-3" role="alert">
                            อีเมลหรือรหัสผ่านไม่ถูกต้อง
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                            เข้าสู่ระบบ
                        </button>
                    </form>

                </div>
                
                <div class="text-center mt-4 text-light opacity-50 small">
                    &copy; 2026 Museum AI Guide
                </div>

            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // ดึงค่าจากฟอร์ม
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            // --- ใส่โค้ดเชื่อมต่อ Supabase หรือ Database ของคุณตรงนี้ ---
            // ตัวอย่าง:
            /*
            supabase.auth.signInWithPassword({ email: email, password: password })
                .then(response => {
                    if (response.error) {
                        errorDiv.classList.remove('d-none');
                        errorDiv.innerText = response.error.message;
                    } else {
                        window.location.href = 'index.html'; // ล็อคอินสำเร็จ ไปหน้าหลัก
                    }
                });
            */
            
            // ทดสอบการแสดงผล (ลบออกเมื่อใช้โค้ดจริง)
            console.log("กำลังเข้าสู่ระบบด้วย:", email);
            errorDiv.classList.add('d-none'); // ซ่อน error หากกำลังโหลด
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
