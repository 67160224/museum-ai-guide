<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Museum AI Guide</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --color-dark: #0C2B4E;
            --color-main: #1A3D64;
            --color-accent: #1D546C;
            --color-light: #F4F4F4;
        }

        body {
            background-color: var(--color-dark);
            color: var(--color-light);
            background-image: radial-gradient(circle at top right, var(--color-main), var(--color-dark));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .reg-card {
            background-color: var(--color-light);
            color: var(--color-dark);
        }

        .text-main { color: var(--color-main) !important; }

        .btn-primary {
            background-color: var(--color-main);
            border-color: var(--color-main);
            color: var(--color-light);
        }
        .btn-primary:hover {
            background-color: var(--color-dark);
            border-color: var(--color-dark);
        }

        .form-control:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 0.25rem rgba(29, 84, 108, 0.25);
        }
    </style>
</head>

<body>

    <div class="position-absolute top-0 end-0 p-3 p-md-4">
        <select class="form-select form-select-sm bg-transparent text-light" style="border-color: rgba(255,255,255,0.3); width: auto;" id="pageLanguage">
            <option value="th" class="text-dark">🇹🇭 ไทย (TH)</option>
            <option value="en" class="text-dark">🇬🇧 English (EN)</option>
            <option value="cn" class="text-dark">🇨🇳 中文 (CN)</option>
        </select>
    </div>

    <div class="container px-3 py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-white mb-2">🏛️ Museum AI</h1>
                    <p id="txt-subtitle" class="text-light opacity-75">นิทรรศการดิจิทัลอัจฉริยะ</p>
                </div>

                <div class="reg-card p-4 p-md-5 rounded-4 shadow-lg border-0">
                    <h3 id="txt-header" class="fw-bold text-center mb-4 text-main">สมัครสมาชิก</h3>
                    
                    <form id="registerForm">
                        <div class="mb-3">
                            <label id="txt-email-label" for="email" class="form-label fw-semibold">อีเมล (Email)</label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="name@example.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label id="txt-pass-label" for="password" class="form-label fw-semibold">รหัสผ่าน (Password)</label>
                            <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••" required minlength="6">
                        </div>

                        <div id="statusMessage" class="alert d-none text-center py-2 mb-3" role="alert"></div>

                        <button type="submit" id="txt-submit-btn" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm mb-3">
                            สร้างบัญชีใหม่
                        </button>
                    </form>

                    <div class="text-center mt-3 small">
                        <span id="txt-has-account" class="text-muted">มีบัญชีอยู่แล้ว?</span> 
                        <a id="txt-login-link" href="login.html" class="fw-bold text-decoration-none text-main">เข้าสู่ระบบที่นี่</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const pageTranslations = {
            th: {
                subtitle: "นิทรรศการดิจิทัลอัจฉริยะ",
                header: "สมัครสมาชิก",
                emailLabel: "อีเมล (Email)",
                passLabel: "รหัสผ่าน (Password)",
                submitBtn: "สร้างบัญชีใหม่",
                hasAccount: "มีบัญชีอยู่แล้ว?",
                loginLink: "เข้าสู่ระบบที่นี่",
                successMsg: "สมัครสมาชิกสำเร็จ! กรุณาตรวจสอบอีเมลเพื่อยืนยัน"
            },
            en: {
                subtitle: "Smart Digital Exhibition",
                header: "Sign Up",
                emailLabel: "Email",
                passLabel: "Password",
                submitBtn: "Create Account",
                hasAccount: "Already have an account?",
                loginLink: "Login here",
                successMsg: "Registration successful! Please check your email to verify."
            },
            cn: {
                subtitle: "智能数字展览",
                header: "注册账号",
                emailLabel: "电子邮件 (Email)",
                passLabel: "密码 (Password)",
                submitBtn: "创建账号",
                hasAccount: "已有账号？",
                loginLink: "在此登录",
                successMsg: "注册成功！请检查您的电子邮件进行验证。"
            }
        };

        document.getElementById("pageLanguage").addEventListener("change", function() {
            const lang = this.value;
            const t = pageTranslations[lang];
            document.getElementById("txt-subtitle").innerText = t.subtitle;
            document.getElementById("txt-header").innerText = t.header;
            document.getElementById("txt-email-label").innerText = t.emailLabel;
            document.getElementById("txt-pass-label").innerText = t.passLabel;
            document.getElementById("txt-submit-btn").innerText = t.submitBtn;
            document.getElementById("txt-has-account").innerText = t.hasAccount;
            document.getElementById("txt-login-link").innerText = t.loginLink;
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const statusBox = document.getElementById('statusMessage');
            statusBox.classList.remove("d-none");
            statusBox.classList.add("alert-success");
            statusBox.innerText = pageTranslations[document.getElementById("pageLanguage").value].successMsg;
        });
    </script>
</body>
</html>
