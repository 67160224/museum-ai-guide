<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Museum AI Guide</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ชุดสี Theme */
        :root {
            --color-dark: #0C2B4E;
            --color-main: #1A3D64;
            --color-accent: #1D546C;
            --color-light: #F4F4F4;
        }

        body {
            background-color: var(--color-dark);
            color: var(--color-light);
            background-image: radial-gradient(circle at top right, var(--color-main), var(--color-dark));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .login-card {
            background-color: var(--color-light);
            color: var(--color-dark);
        }

        .text-main { color: var(--color-main) !important; }
        .text-accent { color: var(--color-accent) !important; }

        .btn-primary {
            background-color: var(--color-main);
            border-color: var(--color-main);
            color: var(--color-light);
        }
        .btn-primary:hover {
            background-color: var(--color-dark);
            border-color: var(--color-dark);
        }

        .btn-outline-custom {
            color: var(--color-main);
            border-color: #ccc;
            background-color: #fff;
        }
        .btn-outline-custom:hover {
            background-color: #e2e8f0;
            color: var(--color-dark);
            border-color: #bbb;
        }

        .form-control:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 0.25rem rgba(29, 84, 108, 0.25);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #888;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ccc;
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
    </style>
</head>

<body>

    <div class="position-absolute top-0 end-0 p-3 p-md-4">
        <select class="form-select form-select-sm bg-transparent text-light" style="border-color: rgba(255,255,255,0.3); width: auto;" id="loginLanguage">
            <option value="th" class="text-dark">🇹🇭 ไทย (TH)</option>
            <option value="en" class="text-dark">🇬🇧 English (EN)</option>
            <option value="cn" class="text-dark">🇨🇳 中文 (CN)</option>
        </select>
    </div>

    <div class="container px-3 py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-white mb-2" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.3);">🏛️ Museum AI</h1>
                    <p id="txt-subtitle" class="text-light opacity-75">นิทรรศการดิจิทัลอัจฉริยะ</p>
                </div>

                <div class="login-card p-4 p-md-5 rounded-4 shadow-lg border-0">
                    <h3 id="txt-header" class="fw-bold text-center mb-4 text-main">เข้าสู่ระบบ</h3>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label id="txt-email-label" for="email" class="form-label fw-semibold">อีเมล (Email)</label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="name@example.com" required>
                        </div>
                        
                        <div class="mb-2">
                            <label id="txt-password-label" for="password" class="form-label fw-semibold">รหัสผ่าน (Password)</label>
                            <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••" required>
                        </div>

                        <div class="d-flex justify-content-end mb-4">
                            <a id="txt-forgot" href="forgot-password.html" class="text-decoration-none small fw-bold text-accent">ลืมรหัสผ่าน?</a>
                        </div>

                        <div id="loginError" class="alert alert-danger d-none text-center py-2 mb-3" role="alert"></div>

                        <button type="submit" id="txt-login-btn" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm mb-3">
                            เข้าสู่ระบบ
                        </button>
                    </form>

                    <div id="txt-divider" class="divider small my-3">หรือเข้าสู่ระบบด้วย</div>

                    <button class="btn btn-outline-custom w-100 fw-bold mb-2 py-2 d-flex align-items-center justify-content-center gap-2" onclick="loginWithGoogle()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-google" viewBox="0 0 16 16">
                            <path d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z"/>
                        </svg>
                        <span id="txt-google">เข้าสู่ระบบด้วย Google</span>
                    </button>

                    <button class="btn btn-outline-custom w-100 fw-bold py-2 mb-4 text-muted" onclick="loginAsGuest()">
                        <span id="txt-guest">👤 เข้าใช้งานแบบไม่ระบุตัวตน</span>
                    </button>

                    <div class="text-center mt-3 small">
                        <span id="txt-no-account" class="text-muted">ยังไม่มีบัญชีใช่ไหม?</span> 
                        <a id="txt-register" href="register.html" class="fw-bold text-decoration-none text-main">สมัครสมาชิกที่นี่</a>
                    </div>

                </div>
                
                <div class="text-center mt-4 text-light opacity-50 small">
                    &copy; 2026 Museum AI Guide
                </div>

            </div>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        // =========================
        // ระบบแปลภาษา (Translation)
        // =========================
        const loginTranslations = {
            th: {
                subtitle: "นิทรรศการดิจิทัลอัจฉริยะ",
                header: "เข้าสู่ระบบ",
                emailLabel: "อีเมล (Email)",
                passwordLabel: "รหัสผ่าน (Password)",
                forgot: "ลืมรหัสผ่าน?",
                loginBtn: "เข้าสู่ระบบ",
                divider: "หรือเข้าสู่ระบบด้วย",
                google: "เข้าสู่ระบบด้วย Google",
                guest: "👤 เข้าใช้งานแบบไม่ระบุตัวตน",
                noAccount: "ยังไม่มีบัญชีใช่ไหม?",
                register: "สมัครสมาชิกที่นี่",
                errorMsg: "อีเมลหรือรหัสผ่านไม่ถูกต้อง"
            },
            en: {
                subtitle: "Smart Digital Exhibition",
                header: "Login",
                emailLabel: "Email",
                passwordLabel: "Password",
                forgot: "Forgot Password?",
                loginBtn: "Login",
                divider: "Or login with",
                google: "Login with Google",
                guest: "👤 Continue as Guest",
                noAccount: "Don't have an account?",
                register: "Register here",
                errorMsg: "Invalid email or password"
            },
            cn: {
                subtitle: "智能数字展览",
                header: "登录",
                emailLabel: "电子邮件 (Email)",
                passwordLabel: "密码 (Password)",
                forgot: "忘记密码？",
                loginBtn: "登录",
                divider: "或使用以下方式登录",
                google: "使用 Google 登录",
                guest: "👤 以访客身份继续",
                noAccount: "还没有账号？",
                register: "在此注册",
                errorMsg: "邮箱或密码无效"
            }
        };

        let currentErrorMsg = loginTranslations["th"].errorMsg;

        document.getElementById("loginLanguage").addEventListener("change", function() {
            const lang = this.value;
            const t = loginTranslations[lang];
            
            document.getElementById("txt-subtitle").innerText = t.subtitle;
            document.getElementById("txt-header").innerText = t.header;
            document.getElementById("txt-email-label").innerText = t.emailLabel;
            document.getElementById("txt-password-label").innerText = t.passwordLabel;
            document.getElementById("txt-forgot").innerText = t.forgot;
            document.getElementById("txt-login-btn").innerText = t.loginBtn;
            document.getElementById("txt-divider").innerText = t.divider;
            document.getElementById("txt-google").innerText = t.google;
            document.getElementById("txt-guest").innerText = t.guest;
            document.getElementById("txt-no-account").innerText = t.noAccount;
            document.getElementById("txt-register").innerText = t.register;

            // อัปเดตข้อความ Error (ถ้าแสดงอยู่)
            currentErrorMsg = t.errorMsg;
            const errorBox = document.getElementById("loginError");
            if (!errorBox.classList.contains("d-none")) {
                errorBox.innerText = currentErrorMsg;
            }
        });

        // =========================
        // ระบบ Login จริงด้วย Supabase
        // =========================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('loginError');

            // เรียกใช้ Supabase Auth
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                errorBox.innerText = currentErrorMsg;
                errorBox.classList.remove("d-none");
            } else {
                errorBox.classList.add("d-none");
                localStorage.removeItem('guestMode'); // ล้างค่า Guest ถ้าล็อคอินจริงสำเร็จ
                window.location.href = "index.html"; 
            }
        });

        async function loginWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
            });
            if (error) console.error("Error with Google Login:", error.message);
        }

        function loginAsGuest() {
            localStorage.setItem('guestMode', 'true'); // บันทึกสถานะ Guest ไว้ในเครื่อง
            window.location.href = "index.html"; 
        }
    </script>
</body>
</html>
