<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งรหัสผ่านใหม่ - Museum AI Guide</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --color-dark: #0C2B4E;
            --color-main: #1A3D64;
            --color-accent: #1D546C;
            --color-light: #F4F4F4;
        }

        body {
            background-color: var(--color-dark);
            color: var(--color-light);
            background-image: radial-gradient(circle at top right, var(--color-main), var(--color-dark));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .update-card {
            background-color: var(--color-light);
            color: var(--color-dark);
        }

        .text-main { color: var(--color-main) !important; }

        .btn-primary {
            background-color: var(--color-main);
            border-color: var(--color-main);
            color: var(--color-light);
        }
        .btn-primary:hover {
            background-color: var(--color-dark);
            border-color: var(--color-dark);
        }

        .form-control:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 0.25rem rgba(29, 84, 108, 0.25);
        }
    </style>
</head>

<body>

    <div class="container px-3 py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-white mb-2">🏛️ Museum AI</h1>
                    <p class="text-light opacity-75">ตั้งรหัสผ่านใหม่เพื่อความปลอดภัย</p>
                </div>

                <div class="update-card p-4 p-md-5 rounded-4 shadow-lg border-0">
                    <h3 class="fw-bold text-center mb-3 text-main">กำหนดรหัสผ่านใหม่</h3>
                    <p class="text-center text-muted small mb-4">กรุณาระบุรหัสผ่านใหม่ที่คุณต้องการใช้งาน</p>
                    
                    <form id="updatePasswordForm">
                        <div class="mb-3">
                            <label for="newPassword" class="form-label fw-semibold">รหัสผ่านใหม่ (New Password)</label>
                            <input type="password" class="form-control form-control-lg" id="newPassword" placeholder="••••••••" required minlength="6">
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label fw-semibold">ยืนยันรหัสผ่านใหม่</label>
                            <input type="password" class="form-control form-control-lg" id="confirmPassword" placeholder="••••••••" required minlength="6">
                        </div>

                        <div id="statusMessage" class="alert d-none text-center py-2 mb-3 small" role="alert"></div>

                        <button type="submit" id="submitBtn" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                            บันทึกรหัสผ่านใหม่
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script>
        // *** ตั้งค่า Supabase ของคุณที่นี่ ***
        const SUPABASE_URL ='https://poderwfuvejrsrqydcbj.supabase.co';
        const SUPABASE_KEY ='sb_publishable_3FtM0O9-55E0OM_Xl7gJ4g_Wlp_NXen';
        const supabase = Object.assign(window['supabase']).createClient(SUPABASE_URL, SUPABASE_KEY);

        const updateForm = document.getElementById('updatePasswordForm');
        const statusBox = document.getElementById('statusMessage');

        updateForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');

            // 1. เช็คว่ารหัสผ่านตรงกันไหม
            if (newPassword !== confirmPassword) {
                showStatus('รหัสผ่านไม่ตรงกัน กรุณาตรวจสอบอีกครั้ง', 'danger');
                return;
            }

            submitBtn.disabled = true;
            showStatus('กำลังบันทึกข้อมูล...', 'info');

            try {
                // 2. อัปเดตรหัสผ่านในระบบ Supabase
                const { data, error } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                // 3. สำเร็จ! แจ้งเตือนและส่งกลับไปหน้า Login
                showStatus('เปลี่ยนรหัสผ่านสำเร็จ! กำลังพาคุณไปหน้าเข้าสู่ระบบ...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);

            } catch (error) {
                showStatus('เกิดข้อผิดพลาด: ' + error.message, 'danger');
                submitBtn.disabled = false;
            }
        });

        function showStatus(msg, type) {
            statusBox.innerText = msg;
            statusBox.className = `alert alert-${type} text-center py-2 mb-3 small`;
            statusBox.classList.remove('d-none');
        }
    </script>
</body>
</html>
