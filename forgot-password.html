<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - Museum AI Guide</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ชุดสี Theme เดียวกับหน้า Login */
        :root {
            --color-dark: #0C2B4E;
            --color-main: #1A3D64;
            --color-accent: #1D546C;
            --color-light: #F4F4F4;
        }

        body {
            background-color: var(--color-dark);
            color: var(--color-light);
            background-image: radial-gradient(circle at top right, var(--color-main), var(--color-dark));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .reset-card {
            background-color: var(--color-light);
            color: var(--color-dark);
        }

        .text-main { color: var(--color-main) !important; }

        .btn-primary {
            background-color: var(--color-main);
            border-color: var(--color-main);
            color: var(--color-light);
        }
        .btn-primary:hover {
            background-color: var(--color-dark);
            border-color: var(--color-dark);
        }

        .form-control:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 0.25rem rgba(29, 84, 108, 0.25);
        }
    </style>
</head>

<body>

    <div class="position-absolute top-0 end-0 p-3 p-md-4">
        <select class="form-select form-select-sm bg-transparent text-light" style="border-color: rgba(255,255,255,0.3); width: auto;" id="pageLanguage">
            <option value="th" class="text-dark">🇹🇭 ไทย (TH)</option>
            <option value="en" class="text-dark">🇬🇧 English (EN)</option>
            <option value="cn" class="text-dark">🇨🇳 中文 (CN)</option>
        </select>
    </div>

    <div class="container px-3 py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-white mb-2">🏛️ Museum AI</h1>
                    <p id="txt-subtitle" class="text-light opacity-75">นิทรรศการดิจิทัลอัจฉริยะ</p>
                </div>

                <div class="reset-card p-4 p-md-5 rounded-4 shadow-lg border-0">
                    <h3 id="txt-header" class="fw-bold text-center mb-4 text-main">ลืมรหัสผ่าน?</h3>
                    <p id="txt-desc" class="text-muted text-center mb-4 small">กรุณากรอกอีเมลที่ใช้สมัครสมาชิก เพื่อรับลิงก์สำหรับตั้งรหัสผ่านใหม่</p>
                    
                    <form id="resetForm">
                        <div class="mb-4">
                            <label id="txt-email-label" for="email" class="form-label fw-semibold">อีเมล (Email)</label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="name@example.com" required>
                        </div>

                        <div id="statusMessage" class="alert d-none text-center py-2 mb-3 small" role="alert"></div>

                        <button type="submit" id="txt-submit-btn" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm mb-3">
                            ส่งลิงก์รีเซ็ตรหัสผ่าน
                        </button>
                    </form>

                    <div class="text-center mt-3 small">
                        <a id="txt-back-link" href="login.html" class="fw-bold text-decoration-none text-main">กลับสู่หน้าเข้าสู่ระบบ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        const pageTranslations = {
            th: {
                subtitle: "นิทรรศการดิจิทัลอัจฉริยะ",
                header: "ลืมรหัสผ่าน?",
                desc: "กรุณากรอกอีเมลที่ใช้สมัครสมาชิก เพื่อรับลิงก์สำหรับตั้งรหัสผ่านใหม่",
                emailLabel: "อีเมล (Email)",
                submitBtn: "ส่งลิงก์รีเซ็ตรหัสผ่าน",
                backLink: "กลับสู่หน้าเข้าสู่ระบบ",
                successMsg: "ส่งลิงก์รีเซ็ตไปที่อีเมลของคุณแล้ว!"
            },
            en: {
                subtitle: "Smart Digital Exhibition",
                header: "Forgot Password?",
                desc: "Please enter your registered email address to receive a password reset link.",
                emailLabel: "Email",
                submitBtn: "Send Reset Link",
                backLink: "Back to Login",
                successMsg: "Password reset link has been sent to your email!"
            },
            cn: {
                subtitle: "智能数字展览",
                header: "忘记密码？",
                desc: "请输入您的注册电子邮件地址，以接收密码重置链接。",
                emailLabel: "电子邮件 (Email)",
                submitBtn: "发送重置链接",
                backLink: "返回登录",
                successMsg: "密码重置链接已发送到您的邮箱！"
            }
        };

        document.getElementById("pageLanguage").addEventListener("change", function() {
            const lang = this.value;
            const t = pageTranslations[lang];
            document.getElementById("txt-subtitle").innerText = t.subtitle;
            document.getElementById("txt-header").innerText = t.header;
            document.getElementById("txt-desc").innerText = t.desc;
            document.getElementById("txt-email-label").innerText = t.emailLabel;
            document.getElementById("txt-submit-btn").innerText = t.submitBtn;
            document.getElementById("txt-back-link").innerText = t.backLink;
        });

        // ระบบส่งลิงก์รีเซ็ตรหัสผ่านจริงผ่าน Supabase
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const statusBox = document.getElementById('statusMessage');
            const lang = document.getElementById("pageLanguage").value;

            // เรียกใช้ฟังก์ชัน resetPassword ของ Supabase
            // โดยกำหนด redirectTo ไปที่หน้า update-password.html เมื่อผู้ใช้กดลิงก์ในเมล
            const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/update-password.html',
            });

            statusBox.classList.remove("d-none");
            if (error) {
                statusBox.className = "alert alert-danger text-center py-2 mb-3 small";
                statusBox.innerText = error.message;
            } else {
                statusBox.className = "alert alert-success text-center py-2 mb-3 small";
                statusBox.innerText = pageTranslations[lang].successMsg;
                document.getElementById('email').value = ""; // เคลียร์ช่อง input
            }
        });
    </script>
</body>
</html>
