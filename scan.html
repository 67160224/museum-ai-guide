<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan QR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
}
#reader{
    width:100%;
    max-width:400px;
    margin:auto;
}
</style>
</head>

<body class="p-4">

<h2 class="mb-4">📷 สแกน QR Code</h2>

<div id="reader"></div>

<br>

<button class="btn btn-secondary mt-3" onclick="goHome()">
⬅ กลับหน้าแรก
</button>

<script>
function onScanSuccess(decodedText) {
    html5QrcodeScanner.clear();
    window.location.href = decodedText;
}

let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
);

html5QrcodeScanner.render(onScanSuccess);

// ✅ กลับหน้าแรกแบบปลอดภัย ไม่ต้องระบุชื่อไฟล์
function goHome(){
    window.location.href = window.location.origin + "/museum/";
}
</script>

</body>
</html>
