<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Artwork</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="card">

    <div id="loading">⏳ Loading...</div>

    <div id="error" class="error"></div>

    <img id="image" alt="Artwork image">

    <h1 id="title"></h1>

    <h3 id="artist"></h3>

    <p id="description"></p>


    <h3>🔊 Audio</h3>

    <button onclick="playTTS('th-TH')">
        ไทย
    </button>

    <button onclick="playTTS('en-US')">
        English
    </button>

    <button onclick="playTTS('zh-CN')">
        中文
    </button>

    <hr>


    <h3>🤖 Ask AI</h3>

    <div class="chat-box" id="chatBox"></div>

    <input
        id="question"
        placeholder="ถามคำถาม..."
    >

    <button onclick="sendQuestion()">
        Send
    </button>

</div>


<script src="js/ai-voice.js"></script>
<script src="js/ai-chat.js"></script>
<script src="js/ai-system.js"></script>


<script>

// -------------------------
// Get Artwork ID
// -------------------------

const params = new URLSearchParams(window.location.search);
const id = params.get("id");


// -------------------------
// Load Artwork Data
// -------------------------

async function loadArtwork(){

    if(!id){
        document.getElementById("loading").style.display = "none";
        document.getElementById("error").innerText = "No artwork ID";
        return;
    }

    try{

        const res = await fetch("artwork.php?id=" + encodeURIComponent(id));

        if(!res.ok){
            throw new Error("Server error");
        }

        const data = await res.json();

        document.getElementById("loading").style.display = "none";

        if(data.error){
            document.getElementById("error").innerText = data.error;
            return;
        }

        document.getElementById("title").innerText = data.title || "";
        document.getElementById("artist").innerText = data.artist || "";
        document.getElementById("description").innerText = data.description || "";

        if(data.image_url){
            document.getElementById("image").src = data.image_url;
        }

    }
    catch(e){

        document.getElementById("loading").style.display = "none";
        document.getElementById("error").innerText = "โหลดข้อมูลไม่สำเร็จ";

    }

}


// -------------------------
// Send Question to AI
// -------------------------

async function sendQuestion(){

    const input = document.getElementById("question");
    const chatBox = document.getElementById("chatBox");

    const message = input.value.trim();

    if(!message){
        return;
    }

    chatBox.innerHTML += "<div><b>You:</b> " + message + "</div>";

    input.value = "";

    try{

        const reply = await AISystem.chat(message);

        chatBox.innerHTML += "<div><b>AI:</b> " + reply + "</div>";

        chatBox.scrollTop = chatBox.scrollHeight;

    }
    catch(e){

        chatBox.innerHTML += "<div><b>AI:</b> Error</div>";

    }

}


// -------------------------

loadArtwork();

</script>

</body>
</html>
